name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GOFLAGS: -tags=exclude_graphdriver_btrfs,exclude_graphdriver_zfs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
      - run: go mod download
      - run: go test ./...
      - run: go build ./cmd/olav
